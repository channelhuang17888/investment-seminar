name: Update Stock Data

on:
  schedule:
    - cron: '5 1 * * 1-5'
    - cron: '0 2,3,4,5,6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yfinance
        run: pip install yfinance --quiet

      - name: Fetch stock prices & history
        run: python3 scripts/fetch_stocks.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No changes" || (git commit -m "stock data $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
